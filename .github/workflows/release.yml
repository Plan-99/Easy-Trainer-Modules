name: Package Modules

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package each module
        run: |
          mkdir -p dist

          for category in robots sensors extensions; do
            if [ ! -d "$category" ]; then continue; fi
            for module_dir in "$category"/*/; do
              [ ! -d "$module_dir" ] && continue
              module_json="$module_dir/module.json"
              if [ ! -f "$module_json" ]; then
                echo "SKIP: $module_dir (no module.json)"
                continue
              fi

              # Read id and version from each module's own module.json
              module_id=$(python3 -c "import json; print(json.load(open('$module_json'))['id'])")
              module_version=$(python3 -c "import json; print(json.load(open('$module_json'))['version'])")
              folder_name=$(basename "$module_dir")

              tar_name="module-${module_id}-${module_version}.tar.gz"
              tar -czf "dist/$tar_name" -C "$category" "$folder_name"
              echo "PACKAGED: $tar_name (v${module_version})"
            done
          done

          ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
